<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartDataInsight 验证码</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f3f5f9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #1f2937;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 28px 14px 36px;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e5eaf1;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }
    .header {
      padding: 20px 24px;
      border-bottom: 1px solid #e9edf5;
      background: #fbfcfe;
    }
    .brand-row {
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
      margin: 0;
      line-height: 1.4;
    }
    .brand-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
      background: #2563eb;
      vertical-align: middle;
    }
    .tag {
      display: inline-block;
      margin-top: 8px;
      font-size: 12px;
      color: #1d4ed8;
      background: #eaf1ff;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 3px 10px;
    }
    .content {
      padding: 24px;
    }
    .title {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      color: #111827;
    }
    .desc {
      margin: 10px 0 0;
      font-size: 14px;
      color: #4b5563;
      line-height: 1.75;
    }
    .code-box {
      margin-top: 18px;
      background: #f7faff;
      border: 1px solid #dbe7ff;
      border-radius: 10px;
      padding: 14px 16px;
      text-align: center;
    }
    .code-label {
      margin: 0;
      font-size: 12px;
      color: #6b7280;
      letter-spacing: 0.2px;
    }
    .code {
      margin: 8px 0 0;
      font-size: 30px;
      letter-spacing: 7px;
      font-weight: 700;
      color: #1d4ed8;
      font-family: "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    .meta {
      margin-top: 16px;
      font-size: 13px;
      color: #6b7280;
      line-height: 1.8;
    }
    .divider {
      margin: 18px 0;
      border: 0;
      border-top: 1px solid #e5e7eb;
    }
    .notice {
      margin: 0;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.7;
    }
    .footer {
      margin-top: 14px;
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
    }

    @media (max-width: 480px) {
      .container { padding: 18px 10px 28px; }
      .header { padding: 16px; }
      .content { padding: 18px 16px 20px; }
      .title { font-size: 18px; }
      .code { font-size: 26px; letter-spacing: 5px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <p class="brand-row"><span class="brand-dot"></span>SmartDataInsight</p>
        <span class="tag">邮箱验证码</span>
      </div>
      <div class="content">
        <p class="title">你好，{username}</p>
        <p class="desc">你正在进行账户验证，请在页面中输入以下 6 位验证码。为保障安全，验证码 5 分钟内有效。</p>
        <div class="code-box">
          <p class="code-label">验证码</p>
          <p class="code">{code}</p>
        </div>
        <p class="meta">如果验证码已过期，请返回页面重新获取。</p>
        <hr class="divider" />
        <p class="notice">若本次操作并非你本人发起，请忽略此邮件。请勿向任何人泄露验证码。</p>
      </div>
    </div>
    <div class="footer">此邮件由系统自动发送，请勿直接回复</div>
  </div>
</body>
</html>
