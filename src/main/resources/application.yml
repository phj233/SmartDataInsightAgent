spring:
  output:
    ansi:
      enabled: always
  config:
    import: optional:classpath:application-secrets.yml
  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations:
        - classpath:db/schema/id-defaults.sql
  application:
    name: SmartDataInsightAgent
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
      chat:
        options:
          temperature: 0.1
          max-tokens: 2500
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
        repositories:
            enabled: false
        database: 1
        connect-timeout: 3000
        timeout: 3000
        host: ${REDIS_HOST}
        password: ${REDIS_PASSWORD}
        lettuce:
          pool:
            # 连接池最大连接数
            max-active: 200
            # 连接池最大阻塞等待时间（使用负值表示没有限制）
            max-wait: -1ms
            # 连接池中的最大空闲连接
            max-idle: 20
            # 连接池中的最小空闲连接
            min-idle: 0

  main:
    allow-bean-definition-overriding: true
  mail:
    host: smtp.office365.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          starttls:
            enable: true
          auth: true
  docker:
    compose:
      enabled: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

minio:
  endpoint: ${MINIO_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET}

jimmer:
  language: kotlin
  dialect: org.babyfish.jimmer.sql.dialect.PostgresDialect
  pretty-sql: false
  show-sql: false
  client:
    ts:
      path: /ts.zip
    openapi:
      path: /openapi.yml
      ui-path: /openapi.html
      properties:
        info:
          title: SmartDataInsightAgent API
          description: |
            This is the OpenAPI specification for the SmartDataInsightAgent API. 
            It provides endpoints for managing agents, tasks, and interactions with the DeepSeek AI service.
          version: 1.0
sa-token:
  token-style: tik
  auto-renew: true
  token-name: token
  is-color-log: true
  timeout: 1296000

logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}){faint} %clr(%-5level) [%clr(智析){cyan}][%clr(traceId:%X{traceId:-}){magenta}][%clr(userId:%X{userId:-}){green}][%clr(taskId:%X{taskId:-}){yellow}] %clr(%logger{36}){blue} %clr(:){faint} %msg%n%wEx"

