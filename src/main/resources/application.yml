spring:
  config:
    import: optional:classpath:application-secrets.yml
  application:
    name: SmartDataInsightAgent
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
      chat:
        options:
          temperature: 0.1
          max-tokens: 2500
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
        repositories:
            enabled: false
        database: 1
        connect-timeout: 3000
        timeout: 3000
        host: ${REDIS_HOST}
        lettuce:
          pool:
            # 连接池最大连接数
            max-active: 200
            # 连接池最大阻塞等待时间（使用负值表示没有限制）
            max-wait: -1ms
            # 连接池中的最大空闲连接
            max-idle: 10
            # 连接池中的最小空闲连接
            min-idle: 0
  main:
    allow-bean-definition-overriding: true
  mail:
    host: smtp.office365.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
jimmer:
  language: kotlin
  dialect: org.babyfish.jimmer.sql.dialect.PostgresDialect
  pretty-sql: true
  show-sql: true

sa-token:
  token-style: tik
  auto-renew: true
  timeout: 604800
