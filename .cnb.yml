# Required CNB secrets:
# REGISTRY_HOST, IMAGE_REPO, REGISTRY_USERNAME, REGISTRY_PASSWORD,
# DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_PRIVATE_KEY
main:
  push:
    - name: docker-build-push-and-ssh-deploy
      runner:
        cpus: 2
      docker:
        image: docker:27-git
      services:
        - docker
      stages:
        - name: build_and_push_image
          jobs:
            - name: docker_build_push
              script: |
                set -e
                : "${REGISTRY_HOST:?Missing REGISTRY_HOST}"
                : "${IMAGE_REPO:?Missing IMAGE_REPO}"
                : "${REGISTRY_USERNAME:?Missing REGISTRY_USERNAME}"
                : "${REGISTRY_PASSWORD:?Missing REGISTRY_PASSWORD}"

                IMAGE_TAG="${CNB_COMMIT_SHORT:-latest}"
                IMAGE="${REGISTRY_HOST}/${IMAGE_REPO}:${IMAGE_TAG}"
                LATEST_IMAGE="${REGISTRY_HOST}/${IMAGE_REPO}:latest"

                echo "${REGISTRY_PASSWORD}" | docker login "${REGISTRY_HOST}" --username "${REGISTRY_USERNAME}" --password-stdin
                docker build --pull -t "${IMAGE}" -f Dockerfile .
                docker push "${IMAGE}"

                if [ "${CNB_BRANCH}" = "main" ]; then
                  docker tag "${IMAGE}" "${LATEST_IMAGE}"
                  docker push "${LATEST_IMAGE}"
                fi

        - name: deploy_to_remote
          jobs:
            - name: ssh_deploy
              script: |
                set -e
                : "${REGISTRY_HOST:?Missing REGISTRY_HOST}"
                : "${IMAGE_REPO:?Missing IMAGE_REPO}"
                : "${DEPLOY_HOST:?Missing DEPLOY_HOST}"
                : "${DEPLOY_USER:?Missing DEPLOY_USER}"
                : "${DEPLOY_SSH_PRIVATE_KEY:?Missing DEPLOY_SSH_PRIVATE_KEY}"

                IMAGE_TAG="${CNB_COMMIT_SHORT:-latest}"
                IMAGE="${REGISTRY_HOST}/${IMAGE_REPO}:${IMAGE_TAG}"
                CONTAINER_NAME="${APP_CONTAINER_NAME:-smart-data-insight-agent}"
                APP_PORT="${APP_PORT:-8080}"
                SSH_PORT="${DEPLOY_PORT:-22}"

                mkdir -p ~/.ssh
                printf "%s\n" "${DEPLOY_SSH_PRIVATE_KEY}" > ~/.ssh/deploy_key
                chmod 600 ~/.ssh/deploy_key

                ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p "${SSH_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "
                  set -e
                  docker pull ${IMAGE}
                  if docker ps -a --format '{{.Names}}' | grep -q '^'\"${CONTAINER_NAME}\"'$'; then
                    docker rm -f ${CONTAINER_NAME}
                  fi
                  docker run -d --name ${CONTAINER_NAME} --restart unless-stopped -p ${APP_PORT}:8080 ${IMAGE}
                "

"$":
  web_trigger:
    - name: manual-deploy
      runner:
        cpus: 2
      docker:
        image: docker:27-git
      services:
        - docker
      stages:
        - name: build_and_push_image
          jobs:
            - name: docker_build_push
              script: |
                set -e
                : "${REGISTRY_HOST:?Missing REGISTRY_HOST}"
                : "${IMAGE_REPO:?Missing IMAGE_REPO}"
                : "${REGISTRY_USERNAME:?Missing REGISTRY_USERNAME}"
                : "${REGISTRY_PASSWORD:?Missing REGISTRY_PASSWORD}"

                IMAGE_TAG="${CNB_COMMIT_SHORT:-manual-${CNB_BUILD_ID}}"
                IMAGE="${REGISTRY_HOST}/${IMAGE_REPO}:${IMAGE_TAG}"

                echo "${REGISTRY_PASSWORD}" | docker login "${REGISTRY_HOST}" --username "${REGISTRY_USERNAME}" --password-stdin
                docker build --pull -t "${IMAGE}" -f Dockerfile .
                docker push "${IMAGE}"

        - name: deploy_to_remote
          jobs:
            - name: ssh_deploy
              script: |
                set -e
                : "${REGISTRY_HOST:?Missing REGISTRY_HOST}"
                : "${IMAGE_REPO:?Missing IMAGE_REPO}"
                : "${DEPLOY_HOST:?Missing DEPLOY_HOST}"
                : "${DEPLOY_USER:?Missing DEPLOY_USER}"
                : "${DEPLOY_SSH_PRIVATE_KEY:?Missing DEPLOY_SSH_PRIVATE_KEY}"

                IMAGE_TAG="${CNB_COMMIT_SHORT:-manual-${CNB_BUILD_ID}}"
                IMAGE="${REGISTRY_HOST}/${IMAGE_REPO}:${IMAGE_TAG}"
                CONTAINER_NAME="${APP_CONTAINER_NAME:-smart-data-insight-agent}"
                APP_PORT="${APP_PORT:-8080}"
                SSH_PORT="${DEPLOY_PORT:-22}"

                mkdir -p ~/.ssh
                printf "%s\n" "${DEPLOY_SSH_PRIVATE_KEY}" > ~/.ssh/deploy_key
                chmod 600 ~/.ssh/deploy_key

                ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p "${SSH_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "
                  set -e
                  docker pull ${IMAGE}
                  if docker ps -a --format '{{.Names}}' | grep -q '^'\"${CONTAINER_NAME}\"'$'; then
                    docker rm -f ${CONTAINER_NAME}
                  fi
                  docker run -d --name ${CONTAINER_NAME} --restart unless-stopped -p ${APP_PORT}:8080 ${IMAGE}
                "


