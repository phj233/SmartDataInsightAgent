# SmartDataInsightAgent CNB 流水线
#
# 通过 CNB 密钥仓库导入运行时变量：
# https://cnb.cool/phj233/env/-/blob/main/sdia.yml
# 必填部署变量：DEPLOY_HOST, DEPLOY_USER
# 认证变量：DEPLOY_SSH_PRIVATE_KEY 或 DEPLOY_PASSWORD
# 运行时变量值来自 CNB imports。
# 本地 sdia.yml 仅作为变量名清单，用于生成容器 env 文件。
master:
  push:
    - name: docker-build-push-and-ssh-deploy
      runner:
        cpus: 2
      docker:
        image: docker:git
      services:
        - docker
      imports:
        - https://cnb.cool/phj233/env/-/blob/main/sdia.yml
      stages:
        - name: build_and_push_image
          jobs:
            - name: docker_build_push
              script: |
                set -e

                export DOCKER_BUILDKIT=1
                REGISTRY_BASE="${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}"
                IMAGE_TAG="${IMAGE_TAG:-latest}"
                SAME_IMAGE="${REGISTRY_BASE}:${IMAGE_TAG}"
                BUILD_IMAGE="${REGISTRY_BASE}:build-${CNB_BUILD_ID}"

                # 尽量复用远端 latest 镜像层缓存。
                docker pull "${REGISTRY_BASE}:latest" >/dev/null 2>&1 || true
                docker build --pull --cache-from "${REGISTRY_BASE}:latest" -t "${BUILD_IMAGE}" .
                docker tag "${BUILD_IMAGE}" "${SAME_IMAGE}"
                docker push "${SAME_IMAGE}"

                # 即使使用自定义标签，也保持 latest 标签可用。
                if [ "${IMAGE_TAG}" != "latest" ]; then
                  docker tag "${BUILD_IMAGE}" "${REGISTRY_BASE}:latest"
                  docker push "${REGISTRY_BASE}:latest"
                fi

                # 可选：将同一镜像推送到自定义子路径。
                if [ -n "${IMAGE_NAME:-}" ]; then
                  CUSTOM_IMAGE="${REGISTRY_BASE}/${IMAGE_NAME}:${IMAGE_TAG}"
                  docker tag "${BUILD_IMAGE}" "${CUSTOM_IMAGE}"
                  docker push "${CUSTOM_IMAGE}"

                  if [ "${IMAGE_TAG}" != "latest" ]; then
                    CUSTOM_LATEST_IMAGE="${REGISTRY_BASE}/${IMAGE_NAME}:latest"
                    docker tag "${BUILD_IMAGE}" "${CUSTOM_LATEST_IMAGE}"
                    docker push "${CUSTOM_LATEST_IMAGE}"
                  fi
                fi

        - name: deploy_to_remote
          jobs:
            - name: ssh_deploy
              script: |
                set -e
                : "${DEPLOY_HOST:?Missing DEPLOY_HOST}"
                : "${DEPLOY_USER:?Missing DEPLOY_USER}"
                if [ -z "${DEPLOY_SSH_PRIVATE_KEY:-}" ] && [ -z "${DEPLOY_PASSWORD:-}" ]; then
                  echo "缺少认证配置：请设置 DEPLOY_SSH_PRIVATE_KEY 或 DEPLOY_PASSWORD" >&2
                  exit 1
                fi
                if [ ! -f sdia.yml ]; then
                  echo "缺少本地 sdia.yml 变量名清单文件" >&2
                  exit 1
                fi

                DEPLOY_IMAGE_PATH="${CNB_REPO_SLUG_LOWERCASE}"
                if [ -n "${DEPLOY_IMAGE_NAME:-}" ]; then
                  DEPLOY_IMAGE_PATH="${CNB_REPO_SLUG_LOWERCASE}/${DEPLOY_IMAGE_NAME}"
                fi

                IMAGE="${CNB_DOCKER_REGISTRY}/${DEPLOY_IMAGE_PATH}:latest"
                CONTAINER_NAME="${APP_CONTAINER_NAME:-smart-data-insight-agent}"
                APP_PORT="${APP_PORT:-8888}"
                CONTAINER_PORT="${CONTAINER_PORT:-8080}"
                SSH_PORT="${DEPLOY_PORT:-22}"
                DOCKER_NETWORK="${DOCKER_NETWORK:-nginx}"
                DOCKER_STATIC_IP="${DOCKER_STATIC_IP:-172.18.0.5}"
                DOCKER_NETWORK_SUBNET="${DOCKER_NETWORK_SUBNET:-172.18.0.0/16}"
                APP_ENV_CONTENT="$(
                  awk '
                    /^[A-Za-z_][A-Za-z0-9_]*:[[:space:]]*/ {
                      sub(/:.*/, "", $0)
                      print $0
                    }
                  ' sdia.yml | while IFS= read -r VAR_NAME; do
                    case "${VAR_NAME}" in
                      DEPLOY_HOST|DEPLOY_USER|DEPLOY_SSH_PRIVATE_KEY|DEPLOY_PASSWORD|DEPLOY_PORT|DOCKER_NETWORK|DOCKER_STATIC_IP|DOCKER_NETWORK_SUBNET|APP_CONTAINER_NAME|APP_PORT|CONTAINER_PORT|IMAGE_NAME|DEPLOY_IMAGE_NAME|IMAGE_TAG)
                        continue
                        ;;
                    esac

                    eval "VAR_IS_SET=\${${VAR_NAME}+x}"
                    if [ -z "${VAR_IS_SET}" ]; then
                      echo "缺少应用环境变量：${VAR_NAME}" >&2
                      exit 1
                    fi

                    eval "VAR_VALUE=\${${VAR_NAME}}"
                    printf '%s=%s\n' "${VAR_NAME}" "${VAR_VALUE}"
                  done
                )" || exit 1
                APP_ENV_B64="$(printf '%s' "${APP_ENV_CONTENT}" | base64 | tr -d '\n')"

                REMOTE_DEPLOY_SCRIPT=$(cat <<EOF_REMOTE
                set -e
                ENV_FILE=/tmp/${CONTAINER_NAME}.env
                trap 'rm -f \$ENV_FILE' EXIT
                if ! printf '%s' '${APP_ENV_B64}' | base64 -d > \$ENV_FILE 2>/dev/null; then
                  printf '%s' '${APP_ENV_B64}' | base64 --decode > \$ENV_FILE
                fi
                chmod 600 \$ENV_FILE
                docker network inspect ${DOCKER_NETWORK} >/dev/null 2>&1 || docker network create --subnet ${DOCKER_NETWORK_SUBNET} ${DOCKER_NETWORK}
                for i in 1 2 3; do
                docker pull ${IMAGE} && break
                if [ "\$i" = "3" ]; then
                echo 'docker pull 连续 3 次失败' >&2
                exit 1
                fi
                sleep 2
                done
                # 每次运行都删除上次容器（不存在时忽略）
                docker rm -f ${CONTAINER_NAME} >/dev/null 2>&1 || true
                # 启动新容器
                docker run -d --name ${CONTAINER_NAME} --restart unless-stopped \
                --network ${DOCKER_NETWORK} \
                --ip ${DOCKER_STATIC_IP} \
                -p ${APP_PORT}:${CONTAINER_PORT} \
                --env-file \$ENV_FILE \
                ${IMAGE}
                EOF_REMOTE
                )

                # 密码模式需要 sshpass，按镜像包管理器做最小安装。
                if [ -n "${DEPLOY_PASSWORD:-}" ] && ! command -v sshpass >/dev/null 2>&1; then
                  if command -v apk >/dev/null 2>&1; then
                    apk add --no-cache sshpass >/dev/null
                  elif command -v apt-get >/dev/null 2>&1; then
                    apt-get update >/dev/null && apt-get install -y --no-install-recommends sshpass >/dev/null
                  else
                    echo "未找到 sshpass，且当前环境没有可用的包管理器可安装" >&2
                    exit 1
                  fi
                fi

                if [ -n "${DEPLOY_PASSWORD:-}" ]; then
                  sshpass -p "${DEPLOY_PASSWORD}" ssh -o StrictHostKeyChecking=no -o PreferredAuthentications=password -o PubkeyAuthentication=no -p "${SSH_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "$REMOTE_DEPLOY_SCRIPT"
                else
                  mkdir -p ~/.ssh
                  printf "%s\n" "${DEPLOY_SSH_PRIVATE_KEY}" > ~/.ssh/deploy_key
                  chmod 600 ~/.ssh/deploy_key

                  ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p "${SSH_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "$REMOTE_DEPLOY_SCRIPT"
                fi
