# SmartDataInsightAgent CNB 流水线
#
# 通过远程文件导入环境变量：
# https://cnb.cool/phj233/env/-/blob/main/sdia.yml
# 必填部署变量：DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_PRIVATE_KEY
# 必填应用变量：DEEPSEEK_API_KEY, DB_URL, DB_USERNAME, DB_PASSWORD, REDIS_HOST,
#               MAIL_USERNAME, MAIL_PASSWORD, MINIO_ENDPOINT, MINIO_ACCESS_KEY,
#               MINIO_SECRET_KEY, MINIO_BUCKET
# 可选变量：IMAGE_NAME, DEPLOY_IMAGE_NAME, APP_CONTAINER_NAME, APP_PORT,
#          CONTAINER_PORT, DEPLOY_PORT, DOCKER_NETWORK, IMAGE_TAG
master:
  push:
    - name: docker-build-push-and-ssh-deploy
      runner:
        cpus: 2
      docker:
        image: ubuntu:24.04
      services:
        - docker  # 保持docker服务（默认用docker:dind提供daemon）
      imports:
        - https://cnb.cool/phj233/env/-/blob/main/sdia.yml
      stages:
        - name: build_and_push_image
          jobs:
            - name: docker_build_push
              script: |
                set -e  # 移至开头，全程错误终止
                # 安装依赖：docker.io + git（直接安装，无需先移除）
                apt-get update && \
                apt-get install -y --no-install-recommends docker.io git && \
                rm -rf /var/lib/apt/lists/* && \
                # 创建并授权cli-plugins目录（确保可写）
                mkdir -p /usr/libexec/docker/cli-plugins && \
                chmod 755 /usr/libexec/docker/cli-plugins
                
                export DOCKER_BUILDKIT=1
                REGISTRY_BASE="${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}"
                IMAGE_TAG="${IMAGE_TAG:-latest}"
                SAME_IMAGE="${REGISTRY_BASE}:${IMAGE_TAG}"
                BUILD_IMAGE="${REGISTRY_BASE}:build-${CNB_BUILD_ID}"
                
                # 复用远端latest缓存（首次构建忽略失败）
                docker pull "${REGISTRY_BASE}:latest" >/dev/null 2>&1 || true
                docker build --pull --cache-from "${REGISTRY_BASE}:latest" -t "${BUILD_IMAGE}" .
                docker tag "${BUILD_IMAGE}" "${SAME_IMAGE}"
                docker push "${SAME_IMAGE}"
                
                # 主分支维护latest标签
                if [ "${IMAGE_TAG}" != "latest" ]; then
                docker tag "${BUILD_IMAGE}" "${REGISTRY_BASE}:latest"
                docker push "${REGISTRY_BASE}:latest"
                fi
                
                # 可选：推送自定义子路径镜像
                if [ -n "${IMAGE_NAME:-}" ]; then
                CUSTOM_IMAGE="${REGISTRY_BASE}/${IMAGE_NAME}:${IMAGE_TAG}"
                docker tag "${BUILD_IMAGE}" "${CUSTOM_IMAGE}"
                docker push "${CUSTOM_IMAGE}"
              
                if [ "${IMAGE_TAG}" != "latest" ]; then
                CUSTOM_LATEST_IMAGE="${REGISTRY_BASE}/${IMAGE_NAME}:latest"
                docker tag "${BUILD_IMAGE}" "${CUSTOM_LATEST_IMAGE}"
                docker push "${CUSTOM_LATEST_IMAGE}"
                fi
                fi

        - name: deploy_to_remote
          jobs:
            - name: ssh_deploy
              script: |
                ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p "${SSH_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "
                set -e
                ENV_FILE=/tmp/${CONTAINER_NAME}.env
                trap 'rm -f \$ENV_FILE' EXIT
                # 无引号here-document：本地变量展开后写入远程ENV_FILE
                cat > \$ENV_FILE <<EOF_ENV
                DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
                DB_URL=${DB_URL}
                DB_USERNAME=${DB_USERNAME}
                DB_PASSWORD=${DB_PASSWORD}
                REDIS_HOST=${REDIS_HOST}
                MAIL_USERNAME=${MAIL_USERNAME}
                MAIL_PASSWORD=${MAIL_PASSWORD}
                MINIO_ENDPOINT=${MINIO_ENDPOINT}
                MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
                MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
                MINIO_BUCKET=${MINIO_BUCKET}
                EOF_ENV
                chmod 600 \$ENV_FILE
                # 确保网络存在
                docker network inspect ${DOCKER_NETWORK} >/dev/null 2>&1 || docker network create ${DOCKER_NETWORK}
                # 重试拉取镜像（最多3次）
                for i in 1 2 3; do
                docker pull ${IMAGE} && break
                if [ \"\$i\" = \"3\" ]; then
                echo 'docker pull failed after 3 attempts' >&2
                exit 1
                fi
                sleep 2
                done
                # 停止并删除旧容器
                if docker ps -a --format '{{.Names}}' | grep -q '^${CONTAINER_NAME}$'; then
                docker rm -f ${CONTAINER_NAME}
                fi
                # 启动新容器
                docker run -d --name ${CONTAINER_NAME} --restart unless-stopped \
                --network ${DOCKER_NETWORK} \
                -p ${APP_PORT}:${CONTAINER_PORT} \
                --env-file \$ENV_FILE \
                ${IMAGE}
                "
